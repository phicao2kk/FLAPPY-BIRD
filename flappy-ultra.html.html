<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird Deluxe</title>

<style>

body{
margin:0;
overflow:hidden;
background:#222;
font-family:Arial, sans-serif;
touch-action:manipulation;
}

#game-container{
position:relative;
width:100vw;
height:100vh;
}

canvas{
display:block;
width:100%;
height:100%;
}

/* ===== GLASS MENU ===== */

#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(8px);
z-index:20;
animation:fadeIn .35s ease;
}

.menu-card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
border-radius:22px;
padding:45px 55px;
text-align:center;
color:white;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
animation:pop .4s ease;
}

.menu-title{
font-size:50px;
font-weight:bold;
letter-spacing:2px;
margin-bottom:10px;
text-shadow:0 0 20px rgba(255,255,255,0.7);
}

.menu-sub{
opacity:0.85;
margin-bottom:30px;
font-size:18px;
}

/* ===== BUTTON ===== */

.btn{
display:block;
width:220px;
margin:10px auto;
padding:16px 20px;
font-size:20px;
font-weight:bold;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(45deg,#ff8a00,#ff3d00);
box-shadow:0 6px 0 #c62800,0 10px 25px rgba(0,0,0,0.5);
transition:all .15s;
}

.btn:hover{
transform:translateY(-2px);
}

.btn:active{
transform:translateY(4px);
box-shadow:0 2px 0 #c62800;
}

.btn-green{
background:linear-gradient(45deg,#2ecc71,#27ae60);
box-shadow:0 6px 0 #1e874b;
}

.btn-blue{
background:linear-gradient(45deg,#3498db,#2980b9);
box-shadow:0 6px 0 #1c5d85;
}

/* SCORE */

#score-display{
position:absolute;
top:20px;
width:100%;
text-align:center;
color:white;
font-size:55px;
font-weight:bold;
pointer-events:none;
z-index:10;
text-shadow:0 0 10px #fff,0 0 20px #ff0,0 0 40px #ff9900;
}

/* PAUSE BUTTON */

#pause-btn{
position:absolute;
top:15px;
left:15px;
width:55px;
height:55px;
font-size:22px;
font-weight:bold;
color:white;
background:#ff9900;
border:none;
border-radius:10px;
cursor:pointer;
box-shadow:0 5px #cc7a00;
z-index:15;
}

/* PAUSE OVERLAY */

#pause-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
z-index:25;
animation:fadeIn .25s ease;
}

.pause-card{
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:40px 60px;
text-align:center;
color:white;
animation:pop .35s ease;
}

.hidden{
display:none!important;
}

/* ANIMATION */

@keyframes pop{
0%{transform:scale(.7);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeIn{
0%{opacity:0;}
100%{opacity:1;}
}

</style>
</head>

<body>

<div id="game-container">

<div id="score-display" class="hidden">0</div>

<button id="pause-btn">⏸</button>

<canvas id="gameCanvas"></canvas>

<!-- MAIN MENU -->

<div id="overlay">

<div class="menu-card">

<div class="menu-title">🐦 FLAPPY BIRD</div>

<div id="status-text" class="menu-sub">
Tap / Space to Fly
</div>

<button id="action-btn" class="btn">🚀 START</button>

</div>

</div>

<!-- PAUSE MENU -->

<div id="pause-overlay" class="hidden">

<div class="pause-card">

<h2>⏸ Paused</h2>

<button id="resume-btn" class="btn-green btn">▶ Resume</button>

<button id="restart-btn" class="btn">🔄 Restart</button>

<button id="menu-btn" class="btn-blue btn">🏠 Main Menu</button>

</div>

</div>

</div>

<script>

/* ===== SOUND ===== */
const scoreSfx=new Audio('https://files.catbox.moe/opoahd.mp3');
const dieSfx=new Audio('https://files.catbox.moe/nj9iyy.mp3');
const jumpSfx=new Audio('https://files.catbox.moe/wm3oz7.mp3');

/* chỉnh âm lượng */

scoreSfx.volume = 1;  // âm thanh ghi điểm
dieSfx.volume = 0.7;    // âm thanh chết
jumpSfx.volume = 0.5;   // âm thanh nhảy

function playSfx(a){
a.pause();
a.currentTime=0;
a.play().catch(()=>{});
}

/* ===== CANVAS ===== */

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

function resizeGame(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeGame();
window.addEventListener("resize",resizeGame);

/* ===== UI ===== */

const overlay=document.getElementById("overlay");
const actionBtn=document.getElementById("action-btn");
const statusText=document.getElementById("status-text");
const scoreDisplay=document.getElementById("score-display");

const pauseBtn=document.getElementById("pause-btn");
const pauseOverlay=document.getElementById("pause-overlay");

const resumeBtn=document.getElementById("resume-btn");
const restartBtn=document.getElementById("restart-btn");
const menuBtn=document.getElementById("menu-btn");

/* ===== IMAGE ===== */

const imgBird=new Image();
imgBird.src="https://i.ibb.co/DZhP3sQ/flappy-bird-Picsart-Ai-Image-Enhancer.png";

const imgPipe=new Image();
imgPipe.src="https://i.ibb.co/sJzt3FxG/PIPE-game-Picsart-Ai-Image-Enhancer.png";

/* ===== CONSTANT ===== */

const BIRD_W=34;
const BIRD_H=24;
const PIPE_W=52;
const PIPE_GAP=120;

const START_SPEED=1.2;
const SPEED_INCREMENT=0.3;

const DAY_DURATION=180;
const ANGULAR_SPEED=(Math.PI*2)/DAY_DURATION;

/* ===== GAME VAR ===== */

let bird;
let pipes;
let clouds=[];
let stars=[];

let score;
let gameOver;
let frame;
let gameStarted=false;

let currentPipeSpeed;

let dayAngle=0;

let lastTime=0;
let paused=false;

/* ===== INIT ===== */

function init(){

bird={
x:80,
y:200,
w:BIRD_W,
h:BIRD_H,
gravity:0.14,
velocity:0,
jump:-4.3
};

pipes=[];
clouds=[];
stars=[];

score=0;
currentPipeSpeed=START_SPEED;

gameOver=false;
frame=0;
gameStarted=true;
paused=false;

scoreDisplay.innerText="0";
scoreDisplay.classList.remove("hidden");

overlay.classList.add("hidden");
pauseOverlay.classList.add("hidden");

for(let i=0;i<6;i++){
clouds.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height*0.4,
speed:0.3+Math.random()*0.5
});
}

for(let i=0;i<60;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height*0.6,
size:Math.random()*2,
twinkle:Math.random()*100
});
}

requestAnimationFrame(gameLoop);

}

/* ===== INPUT ===== */

function handleInput(){

if(!gameStarted||gameOver){
init();
return;
}

if(paused)return;

bird.velocity=bird.jump;
playSfx(jumpSfx);

}

window.addEventListener("keydown",e=>{
if(e.code==="Space"){
e.preventDefault();
handleInput();
}
});

canvas.addEventListener("mousedown",handleInput);
canvas.addEventListener("touchstart",e=>{
e.preventDefault();
handleInput();
});

actionBtn.onclick=handleInput;

/* ===== PAUSE ===== */

pauseBtn.onclick=()=>{
if(!gameStarted||gameOver)return;
paused=true;
pauseOverlay.classList.remove("hidden");
};

resumeBtn.onclick=()=>{
paused=false;
pauseOverlay.classList.add("hidden");
lastTime=performance.now();
requestAnimationFrame(gameLoop);
};

restartBtn.onclick=init;

menuBtn.onclick=()=>{
pauseOverlay.classList.add("hidden");
overlay.classList.remove("hidden");
gameStarted=false;
};

/* ===== PIPE ===== */

function createPipe(){

let minH=50;
let topH=Math.floor(Math.random()*(canvas.height-PIPE_GAP-(minH*2)))+minH;

pipes.push({x:canvas.width,y:0,w:PIPE_W,h:topH,type:"top",passed:false});
pipes.push({x:canvas.width,y:topH+PIPE_GAP,w:PIPE_W,h:canvas.height,type:"bottom"});

}

/* ===== UPDATE ===== */

function update(delta){

frame++;

dayAngle+=ANGULAR_SPEED*delta;

bird.velocity+=bird.gravity;
bird.y+=bird.velocity;

let spawnInterval=Math.max(50,Math.floor(225/currentPipeSpeed));

if(frame%spawnInterval===0)createPipe();

clouds.forEach(c=>{
c.x-=c.speed;
if(c.x<-100){
c.x=canvas.width+Math.random()*200;
c.y=Math.random()*canvas.height*0.4;
}
});

pipes.forEach(p=>{

p.x-=currentPipeSpeed;

if(
bird.x+4<p.x+p.w &&
bird.x+bird.w-4>p.x &&
bird.y+4<p.y+p.h &&
bird.y+bird.h-4>p.y
){
triggerGameOver();
}

if(p.type==="top"&&p.x+p.w<bird.x&&!p.passed){
score++;
p.passed=true;
scoreDisplay.innerText=score;

if(score%5===0){
currentPipeSpeed+=SPEED_INCREMENT;
}

playSfx(scoreSfx);

}

});

pipes=pipes.filter(p=>p.x>-p.w);

if(bird.y+bird.h>canvas.height||bird.y<0){
triggerGameOver();
}

}

/* ===== GAME OVER ===== */

function triggerGameOver(){

if(gameOver)return;

gameOver=true;

playSfx(dieSfx);

statusText.innerText="GAME OVER";
actionBtn.innerText="🔄 REPLAY";

overlay.classList.remove("hidden");

}

/* ===== DRAW ===== */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* SKY */

let dayFactor=Math.max(0,Math.sin(dayAngle));

let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,`rgb(${40+150*dayFactor},${100+150*dayFactor},220)`);
grad.addColorStop(1,`rgb(${20+180*dayFactor},${60+200*dayFactor},200)`);

ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* CLOUDS */

ctx.fillStyle="rgba(255,255,255,0.8)";
clouds.forEach(c=>{
ctx.beginPath();
ctx.arc(c.x,c.y,25,0,Math.PI*2);
ctx.arc(c.x+20,c.y+5,20,0,Math.PI*2);
ctx.arc(c.x-20,c.y+5,20,0,Math.PI*2);
ctx.fill();
});

/* PIPES */

pipes.forEach(p=>{

ctx.save();

if(p.type==="top"){
ctx.translate(p.x+p.w/2,p.y+p.h/2);
ctx.rotate(Math.PI);
ctx.drawImage(imgPipe,-p.w/2,-p.h/2,p.w,p.h);
}else{
ctx.drawImage(imgPipe,p.x,p.y,p.w,p.h);
}

ctx.restore();

});

/* BIRD */

ctx.save();

ctx.translate(bird.x+bird.w/2,bird.y+bird.h/2);

let rotation=Math.min(Math.max(bird.velocity*0.08,-0.5),1.3);

ctx.rotate(rotation);

ctx.drawImage(imgBird,-bird.w/2,-bird.h/2,bird.w,bird.h);

ctx.restore();

}

/* ===== LOOP ===== */

function gameLoop(time){

if(gameOver||paused)return;

if(!lastTime)lastTime=time;

let delta=(time-lastTime)/1000;
lastTime=time;

update(delta);
draw();

requestAnimationFrame(gameLoop);

}

</script>

</body>
</html>
